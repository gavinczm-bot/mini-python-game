<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            text-align: center;
            overscroll-behavior: none;
        }

        .page {
            min-height: 100vh;
            padding: 22px 14px 34px 14px;
        }

        h1 {
            margin: 8px 0 5px 0;
            font-size: clamp(28px, 8vw, 40px);
        }

        .top-links {
            margin-bottom: 10px;
        }

        .top-links a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: bold;
        }

        .top-links a:hover {
            text-decoration: underline;
        }

        .score-box {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .game-area {
            width: min(92vw, 400px);
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #020617;
            border: 4px solid #374151;
            border-radius: 10px;
            display: block;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            color: #d1d5db;
            line-height: 1.4;
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: 74px 74px 74px;
            grid-template-rows: 64px 64px;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
            touch-action: none;
        }

        .mobile-controls button,
        .restart-button {
            padding: 10px 18px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-controls button:hover,
        .restart-button:hover {
            background: #16a34a;
        }

        .mobile-controls button:active,
        .restart-button:active {
            transform: scale(0.96);
        }

        .up-button {
            grid-column: 2;
            grid-row: 1;
        }

        .left-button {
            grid-column: 1;
            grid-row: 2;
        }

        .down-button {
            grid-column: 2;
            grid-row: 2;
        }

        .right-button {
            grid-column: 3;
            grid-row: 2;
        }

        .restart-button {
            margin-top: 15px;
            font-size: 16px;
            background: #3b82f6;
        }

        .restart-button:hover {
            background: #2563eb;
        }

        @media (min-width: 700px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-links">
            <a href="{{ url_for('home') }}">← Back to Games</a>
        </div>

        <h1>Snake Game</h1>

        <div class="score-box">
            Score: <span id="score">0</span>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="mobile-controls" aria-label="Mobile controls">
            <button class="up-button" data-direction="UP">▲</button>
            <button class="left-button" data-direction="LEFT">◀</button>
            <button class="down-button" data-direction="DOWN">▼</button>
            <button class="right-button" data-direction="RIGHT">▶</button>
        </div>

        <button class="restart-button" onclick="restartGame()">Restart Game</button>

        <div class="controls">
            Desktop: use arrow keys.<br>
            Mobile: swipe on the game board or use the buttons.
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
