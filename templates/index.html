<!DOCTYPE html>
<html>
<head>
    <title>Python Snake Game</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            text-align: center;
        }

        .page {
            padding-top: 30px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .score-box {
            font-size: 20px;
            margin-bottom: 15px;
        }

        canvas {
            background: #020617;
            border: 4px solid #374151;
            border-radius: 10px;
        }

        .controls {
            margin-top: 15px;
            color: #d1d5db;
        }

        button {
            margin-top: 15px;
            padding: 10px 22px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Snake Game</h1>

        <div class="score-box">
            Score: <span id="score">0</span>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <br>

        <button onclick="restartGame()">Restart Game</button>

        <div class="controls">
            Use arrow keys to move the snake.
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
