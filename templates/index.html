<!DOCTYPE html>
<html>
<head>
    <title>Snake Game - Start</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1f2937, #020617 65%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .start-card {
            width: 420px;
            max-width: calc(100% - 40px);
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
        }

        .snake-icon {
            font-size: 56px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 42px;
            margin: 0 0 12px 0;
        }

        p {
            color: #d1d5db;
            font-size: 16px;
            line-height: 1.6;
            margin: 10px 0;
        }

        .rules {
            margin: 24px 0;
            padding: 16px;
            background: #020617;
            border-radius: 16px;
            border: 1px solid #1f2937;
            text-align: left;
        }

        .rules div {
            margin: 8px 0;
            color: #e5e7eb;
        }

        a.start-button {
            display: inline-block;
            margin-top: 10px;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 999px;
            background: #22c55e;
            color: white;
        }

        a.start-button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>
    <div class="start-card">
        <div class="snake-icon">🐍</div>
        <h1>Snake Game</h1>
        <p>Eat the red food, grow longer, and avoid hitting the walls or yourself.</p>

        <div class="rules">
            <div><strong>Move:</strong> Arrow keys</div>
            <div><strong>Goal:</strong> Eat as much food as possible</div>
            <div><strong>Game Over:</strong> Wall hit or self collision</div>
        </div>

        <a class="start-button" href="{{ url_for('game_page') }}">Start Game</a>
    </div>
</body>
</html>
