<!DOCTYPE html>
<html>
<head>
    <title>Python Snake Game</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            text-align: center;
        }

        .page {
            padding-top: 30px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .score-box {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .game-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        canvas {
            background: #020617;
            border: 4px solid #374151;
            border-radius: 10px;
        }

        .start-screen {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 400px;
            height: 400px;
            background: rgba(2, 6, 23, 0.95);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-card {
            width: 300px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .start-card h2 {
            margin-top: 0;
            font-size: 30px;
        }

        .start-card p {
            color: #d1d5db;
            line-height: 1.5;
        }

        .controls {
            margin-top: 15px;
            color: #d1d5db;
        }

        button {
            margin-top: 15px;
            padding: 10px 22px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .secondary-button {
            background: #3b82f6;
        }

        .secondary-button:hover {
            background: #2563eb;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Snake Game</h1>

        <div class="score-box">
            Score: <span id="score">0</span>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div id="startScreen" class="start-screen">
                <div class="start-card">
                    <h2>Snake Game</h2>
                    <p>Eat the red food, grow the snake, and avoid hitting the wall or yourself.</p>
                    <p>Use the arrow keys to move.</p>
                    <button onclick="startGameFromButton()">Start Game</button>
                </div>
            </div>
        </div>

        <br>

        <button class="secondary-button" onclick="restartGame()">Restart Game</button>

        <div class="controls">
            Use arrow keys to move the snake.
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
